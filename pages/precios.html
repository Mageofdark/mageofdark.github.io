<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Precios</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<main>

    <h1>Comparador de Precios</h1>

    <table class="tabla-comparador">
        <thead>
            <tr>
                <th>Destino</th>
                <th>Precio</th>
                <th>Incluye</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Caribe</td>
                <td>$1200</td>
                <td>
                    Hotel
                    <span class="tooltip">Incluye acceso ilimitado</span>
                </td>
            </tr>

            <tr>
                <td>Europa</td>
                <td>$2000</td>
                <td>
                    Vuelo + Hotel
                    <span class="tooltip">Todo incluido</span>
                </td>
            </tr>
        </tbody>
    </table>

</main>

</body>
</html>
