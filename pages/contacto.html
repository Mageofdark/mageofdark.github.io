<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Boostrap CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Boostrap ICONS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg bg-body-tertiary py-3">
        <div class="container-fluid">

            <!-- Brand -->
            <a class="navbar-brand fs-1 ps-5 py-2 fw-bold" href="../index.html">
                Grand Tour GT
            </a>

            <!-- Toggler -->
            <button class="navbar-toggler" type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#navbarToggler" 
                aria-controls="navbarToggler" 
                aria-expanded="false" 
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="navbarToggler">
                <ul class="navbar-nav ms-auto fs-4 gap-3">

                    <li class="nav-item">
                        <a href="../index.html" class="nav-link py-3 px-3">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a href="destinos.html" class="nav-link py-3 px-3">Destinos</a>
                    </li>

                    <li class="nav-item">
                        <a href="agencias.html" class="nav-link py-3 px-3">Agencias</a>
                    </li>

                    <li class="nav-item">
                        <a href="blog.html" class="nav-link py-3 px-3">Blog</a>
                    </li>

                    <li class="nav-item">
                        <a href="contacto.html" class="nav-link active py-3 px-3" aria-current="page">Contacto</a>
                    </li>

                    <li class="nav-item">
                        <a href="precios.html" class="nav-link py-3 px-3">Precios</a>
                    </li>

                    <li class="nav-item pe-5">
                        <button id="themeToggle" class="nav-link fs-4 px-3 py-3 border-0 bg-transparent" onclick=toggleDarkMode()>
                            <i class="bi bi-moon"></i>
                        </button>
                    </li>
                </ul>
            </div>

                <li><a href="blog.html">Blog</a></li>

                <li><a href="contacto.html">Contacto</a></li>

                <li><a href="precios.html">Ofertas</a></li>

                <li>
                  <button class="dark-toggle" onclick="toggleDarkMode()">🌓</button>
                </li>
                
            </ul>
        </nav>
    </header>

<main>

    <section class="contacto">

        <h1>Contacto</h1>

        <form>

            <input type="text" placeholder="Nombre" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Mensaje" required></textarea>

            <button type="submit">Enviar</button>

        </form>

        <!-- SPINNER -->
        <div class="spinner"></div>

    </section>

</main>

<!-- MODAL -->
<div class="modal">
    <div class="modal-content">
        <p>Mensaje enviado correctamente</p>
        <button>Cerrar</button>
    </div>
</div>

<!-- FOOTER -->
    <footer>

        <div class="footer-grid">

            <!-- Newsletter -->
            <section class="newsletter">
                <h3>Suscríbete</h3>
                <form>
                    <input type="email" placeholder="Tu correo" required>
                    <button type="submit">Enviar</button>
                </form>
            </section>

            <!-- Redes -->
            <section class="redes">
                <h3>Síguenos</h3>
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">Twitter</a>
            </section>

            <!-- Mapa -->
            <section class="mapa">
                <h3>Ubicación</h3>
                <iframe 
                    src="https://www.google.com/maps?q=Jujuy&output=embed"
                    width="100%" 
                    height="200" 
                    style="border:0;" 
                    loading="lazy">
                </iframe>
            </section>

        </div>

    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../javascript/darkmode.js"></script>
</body>
</html>
