<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destinos</title>
<link rel="stylesheet" href="../styles/destinos.css">
</head>

<body>

<!-- ================= FILTROS ================= -->
<div class="filtros">

  <input type="radio" name="filtro" id="todos" checked>
  <label for="todos">Todos</label>

  <input type="radio" name="filtro" id="cultural">
  <label for="cultural">Cultural</label>

  <input type="radio" name="filtro" id="naturaleza">
  <label for="naturaleza">Naturaleza</label>

  <input type="radio" name="filtro" id="playa">
  <label for="playa">Playa</label>

  <input type="radio" name="filtro" id="gastronomia">
  <label for="gastronomia">Gastronomía</label>

  <input type="radio" name="filtro" id="religioso">
  <label for="religioso">Religioso</label>

</div>

<!-- ================= DESTINOS ================= -->
<div class="destinos">

  <!-- CULTURAL -->
  <div class="card cultural">
    <img src="../img/destinos/cultural/mexico.jpg">
    <div class="overlay">México</div>
  </div>

  <div class="card cultural">
    <img src="../img/destinos/cultural/coliseo romano.jpg">
    <div class="overlay">Roma</div>
  </div>

  <div class="card cultural">
    <img src="../img/destinos/cultural/Capa_turismo_cultural.png.png">
    <div class="overlay">Cusco</div>
  </div>

  <!-- NATURALEZA -->
  <div class="card naturaleza">
    <img src="../img/destinos/naturaleza/cascada.jfif">
    <div class="overlay">Cascada</div>
  </div>

  <div class="card naturaleza">
    <img src="../img/destinos/naturaleza/indomita.jfif">
    <div class="overlay">Indómita</div>
  </div>

  <div class="card naturaleza">
    <img src="../img/destinos/naturaleza/naturalezaHiking.jfif">
    <div class="overlay">Hiking</div>
  </div>

  <!-- PLAYA -->
  <div class="card playa">
    <img src="../img/destinos/playa/beach.jfif">
    <div class="overlay">Playa</div>
  </div>

  <div class="card playa">
    <img src="../img/destinos/playa/caribe.jpg">
    <div class="overlay">Caribe</div>
  </div>

  <div class="card playa">
    <img src="../img/destinos/playa/playa top.jpg">
    <div class="overlay">Cancún</div>
  </div>

  <!-- GASTRONOMÍA -->
  <div class="card gastronomia">
    <img src="../img/destinos/gastronomia/asado.jfif">
    <div class="overlay">Argentina</div>
  </div>

  <div class="card gastronomia">
    <img src="../img/destinos/gastronomia/peru.jfif">
    <div class="overlay">Perú</div>
  </div>

  <div class="card gastronomia">
    <img src="../img/destinos/gastronomia/argentina.jfif">
    <div class="overlay">Postres</div>
  </div>

  <!-- RELIGIOSO -->
  <div class="card religioso">
    <img src="../img/destinos/religioso/buda.jfif">
    <div class="overlay">Budismo</div>
  </div>

  <div class="card religioso">
    <img src="../img/destinos/religioso/budismo.jfif">
    <div class="overlay">Templo</div>
  </div>

  <div class="card religioso">
    <img src="../img/destinos/religioso/cristiano.webp">
    <div class="overlay">Cristianismo</div>
  </div>

</div>

<!-- ================= TABLA ================= -->
<div class="tabla-container">
<table>

<thead>
<tr>
  <th>Destino</th>
  <th>Categoría</th>
  <th>Precio</th>
</tr>
</thead>

<tbody>

<tr class="cultural">
  <td data-label="Destino">Cusco</td>
  <td data-label="Categoría">Cultural</td>
  <td data-label="Precio">$1200</td>
</tr>

<tr class="naturaleza">
  <td data-label="Destino">Patagonia</td>
  <td data-label="Categoría">Naturaleza</td>
  <td data-label="Precio">$1100</td>
</tr>

<tr class="playa">
  <td data-label="Destino">Cancún</td>
  <td data-label="Categoría">Playa</td>
  <td data-label="Precio">$1500</td>
</tr>

<tr class="gastronomia">
  <td data-label="Destino">Lima</td>
  <td data-label="Categoría">Gastronomía</td>
  <td data-label="Precio">$1000</td>
</tr>

<tr class="religioso">
  <td data-label="Destino">Vaticano</td>
  <td data-label="Categoría">Religioso</td>
  <td data-label="Precio">$1400</td>
</tr>

</tbody>

</table>
</div>

</body>
</html>
